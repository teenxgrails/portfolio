<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Été23</title>
  <meta name="description" content="été23 — websites, programs, videos and designs." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/hero-fonts.css" />
</head>
<body>
  <main class="dash">
    <nav class="dash__grid" aria-label="Categories">

      <a class="tile tile--websites" href="/websites" data-transition data-reveal>
        <span class="tile__media">
          <video autoplay loop muted playsinline preload="metadata" data-autoplay>
            <source src="/assets/videos/websites/teenxgrailed2025/dekstop.mp4" type="video/mp4" />
          </video>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_websites">Websites</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--programs" href="/programs" data-transition data-reveal>
        <span class="tile__media tile__media--phone">
          <span class="dash-phone">
            <video autoplay loop muted playsinline preload="metadata" data-autoplay>
              <source src="/assets/programs/budget/mobile.mp4" type="video/mp4" />
            </video>
          </span>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_programs">Programs</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--videos" href="/videos" data-transition data-reveal>
        <span class="tile__media">
          <video autoplay loop muted playsinline preload="metadata" data-autoplay>
            <source src="/assets/videos/teenxgrailed2.mp4" type="video/mp4" />
          </video>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_videos">Videos</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--designs" href="/designs" data-transition data-reveal>
        <span class="tile__media">
          <img id="dash-designs" src="/assets/images/designs/061.jpg" alt="" loading="lazy" />
        </span>
        <span class="tile__label">
          <span class="tile__name">DESIGNS 2022–2023</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

    </nav>

    <section class="dash__hero">
      <button class="hero-email" id="hero-email" type="button"
              aria-label="Copy contact@ete23.com to clipboard">contact@ete23.com</button>
      <span class="hero-hint" id="hero-hint" aria-hidden="true">click to copy</span>
    </section>
    <footer class="dash__footer">été23</footer>
  </main>

  <!-- play/pause tiles only when >=50% visible -->
  <script>
    (function () {
      var vids = document.querySelectorAll("video[data-autoplay]");
      if (!vids.length || !("IntersectionObserver" in window)) return;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          var v = e.target;
          if (e.isIntersecting && e.intersectionRatio >= 0.5) {
            var p = v.play(); if (p && p.catch) p.catch(function () {});
          } else { v.pause(); }
        });
      }, { threshold: [0, 0.5, 1] });
      vids.forEach(function (v) { io.observe(v); });
    })();
  </script>

  <!-- designs tile: swap to a random design image every 2 seconds -->
  <script>
    (function () {
      var img = document.getElementById("dash-designs");
      if (!img) return;
      fetch("/data/designs.json").then(function (r) { return r.json(); }).then(function (data) {
        var imgs = (data.items || []).map(function (it) { return it.image; }).filter(Boolean);
        if (imgs.length < 2) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        setInterval(function () {
          var next = imgs[Math.floor(Math.random() * imgs.length)];
          if (next && next !== img.getAttribute("src")) img.src = next;
        }, 2000);
      }).catch(function () {});
    })();
  </script>

  <!-- bottom contact: cycle unusual faces (paused on hover), click to copy -->
  <script>
    (function () {
      var el = document.getElementById("hero-email");
      var hint = document.getElementById("hero-hint");
      if (!el) return;
      var EMAIL = "contact@ete23.com";

      var faces = [
        '"Helvetica Neue LT", Helvetica, Arial, sans-serif',
        '"Anton", sans-serif',
        '"Bungee", sans-serif',
        '"Monoton", sans-serif',
        '"Pirata One", serif',
        '"Rubik Mono One", monospace',
        '"Rampart One", sans-serif',
        '"Faster One", sans-serif',
        '"Nosifer", sans-serif',
        '"Megrim", sans-serif',
        '"Syne", sans-serif'
      ];
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var paused = false, i = 0;
      el.addEventListener("mouseenter", function () { paused = true; });
      el.addEventListener("mouseleave", function () { paused = false; });
      if (!reduce) {
        setInterval(function () {
          if (paused) return;            // don't swap while hovering (no fl/ glitch)
          i = (i + 1) % faces.length;
          el.style.fontFamily = faces[i];
        }, 2000);
      }

      var resetTimer;
      el.addEventListener("click", function () {
        function done() {
          if (hint) hint.textContent = "copied";
          el.classList.add("is-copied");
          clearTimeout(resetTimer);
          resetTimer = setTimeout(function () {
            el.classList.remove("is-copied");
            if (hint) hint.textContent = "click to copy";
          }, 1600);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(EMAIL).then(done, done);
        } else {
          var r = document.createRange(); r.selectNodeContents(el);
          var s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
          try { document.execCommand("copy"); } catch (e) {}
          done();
        }
      });
    })();
  </script>

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/scroll-smooth.js"></script>
  <script src="/js/reveal.js"></script>
  <script src="/js/transitions.js"></script>
</body>
</html>
