<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Été23</title>
  <meta name="description" content="été23 — websites, programs, videos and designs." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/grid-page.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <main class="dash">
    <nav class="dash__grid" aria-label="Categories">

      <a class="tile tile--websites" href="/websites" data-transition data-reveal>
        <span class="tile__media">
          <video autoplay loop muted playsinline preload="metadata" data-autoplay>
            <source src="/assets/videos/websites/teenxgrailed2025/dekstop.mp4" type="video/mp4" />
          </video>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_websites">Websites</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--programs" href="/programs" data-transition data-reveal>
        <span class="tile__media tile__media--phone">
          <div class="phone"><div class="phone__screen"><div class="media media--mobile">
            <video autoplay loop muted playsinline preload="metadata" data-autoplay>
              <source src="/assets/programs/budget/mobile.mp4" type="video/mp4" />
            </video>
          </div></div></div>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_programs">Programs</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--videos" href="/videos" data-transition data-reveal>
        <span class="tile__media">
          <video autoplay loop muted playsinline preload="metadata" data-autoplay>
            <source src="/assets/videos/teenxgrailed2.mp4" type="video/mp4" />
          </video>
        </span>
        <span class="tile__label">
          <span class="tile__name" data-i18n="cat_videos">Videos</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

      <a class="tile tile--designs" href="/designs" data-transition data-reveal>
        <span class="tile__media">
          <img id="dash-designs" src="/assets/images/designs/061.jpg" alt="" loading="lazy" />
        </span>
        <span class="tile__label">
          <span class="tile__name">DESIGNS 2022–2023</span>
          <i class="tile__arrow" aria-hidden="true"></i>
        </span>
      </a>

    </nav>

    <section class="dash__hero">
      <div class="hero-inner">
        <div class="hero-pos">
          <button class="hero-email" id="hero-email" type="button"
                  aria-label="Copy contact@ete23.com to clipboard">contact@ete23.com</button>
          <span class="hero-copied" id="hero-copied" aria-hidden="true">copied</span>
        </div>
      </div>
    </section>
    <footer class="dash__footer">été23</footer>
  </main>

  <!-- play/pause tiles only when >=50% visible -->
  <script>
    (function () {
      var vids = document.querySelectorAll("video[data-autoplay]");
      if (!vids.length || !("IntersectionObserver" in window)) return;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          var v = e.target;
          if (e.isIntersecting && e.intersectionRatio >= 0.5) {
            var p = v.play(); if (p && p.catch) p.catch(function () {});
          } else { v.pause(); }
        });
      }, { threshold: [0, 0.5, 1] });
      vids.forEach(function (v) { io.observe(v); });
    })();
  </script>

  <!-- designs tile: swap to a random design image every 2 seconds -->
  <script>
    (function () {
      var img = document.getElementById("dash-designs");
      if (!img) return;
      fetch("/data/designs.json").then(function (r) { return r.json(); }).then(function (data) {
        var imgs = (data.items || []).map(function (it) { return it.image; })
          .filter(Boolean).reverse().slice(0, 20);   // last 20 designs
        if (imgs.length < 2) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        setInterval(function () {
          var next = imgs[Math.floor(Math.random() * imgs.length)];
          if (next && next !== img.getAttribute("src")) img.src = next;
        }, 1500);
      }).catch(function () {});
    })();
  </script>

  <!-- bottom contact: grows + centers on scroll; click copies with a small pulse -->
  <script>
    (function () {
      var hero = document.querySelector(".dash__hero");
      var pos = document.querySelector(".hero-pos");
      var el = document.getElementById("hero-email");
      var copied = document.getElementById("hero-copied");
      if (!hero || !pos || !el) return;
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      // starts growing the moment it enters from the bottom; sticky keeps it on
      // screen, so it scales up and drifts down to centre as you scroll
      function frame() {
        var r = hero.getBoundingClientRect();
        var vh = window.innerHeight;
        var total = hero.offsetHeight - vh;
        var p = Math.min(Math.max((vh - r.top) / (vh + total), 0), 1);
        el.style.setProperty("--hp", (0.22 + 0.78 * p).toFixed(3));
        pos.style.transform = "translateY(" + (-24 * (1 - p)).toFixed(2) + "vh)";
        raf = requestAnimationFrame(frame);
      }
      var raf;
      if (reduce) { el.style.setProperty("--hp", "1"); pos.style.transform = "none"; }
      else raf = requestAnimationFrame(frame);

      // click to copy + tiny "copied" pulse; cursor flips to progress briefly
      var resetTimer;
      el.addEventListener("click", function () {
        function done() {
          el.classList.add("is-copied");
          if (copied) copied.classList.add("show");
          clearTimeout(resetTimer);
          resetTimer = setTimeout(function () {
            el.classList.remove("is-copied");
            if (copied) copied.classList.remove("show");
          }, 1400);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText("contact@ete23.com").then(done, done);
        } else { done(); }
      });
    })();
  </script>

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/scroll-smooth.js"></script>
  <script src="/js/reveal.js"></script>
  <script src="/js/transitions.js"></script>
</body>
</html>
