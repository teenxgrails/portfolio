backend:
  name: github
  repo: teenxgrails/portfolio
  branch: main
  # base_url: https://YOUR-OAUTH-PROXY.vercel.app   # set after deploying the OAuth proxy (see README)

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "websites"
    label: "Websites"
    files:
      - file: "data/websites.json"
        name: "websites"
        label: "Websites list"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string", required: false }
              - { label: "Layout", name: "layout", widget: "select", default: "desktop-mobile",
                  options: ["desktop-mobile", "mobile-desktop", "desktop-only"] }
              - { label: "Desktop video", name: "desktopVideo", widget: "file", required: false }
              - { label: "Mobile video", name: "mobileVideo", widget: "file", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }

  - name: "programs"
    label: "Programs"
    files:
      - file: "data/programs.json"
        name: "programs"
        label: "Programs list"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string", required: false }
              - { label: "Layout", name: "layout", widget: "select", default: "desktop-mobile",
                  options: ["desktop-mobile", "mobile-desktop", "desktop-only"] }
              - { label: "Desktop video", name: "desktopVideo", widget: "file", required: false }
              - { label: "Mobile video", name: "mobileVideo", widget: "file", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }

  - name: "videos"
    label: "Videos"
    files:
      - file: "data/videos.json"
        name: "videos"
        label: "Videos list"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string", required: false }
              - { label: "Video", name: "video", widget: "file", required: false }
              - { label: "Poster image", name: "poster", widget: "image", required: false }

  - name: "designs"
    label: "Designs"
    files:
      - file: "data/designs.json"
        name: "designs"
        label: "Designs list"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image" }
