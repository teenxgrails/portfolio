<!DOCTYPE html>

  <a class="back-arrow" href="/" data-transition aria-label="Back to index">

  <main class="page page--full">
    <!-- animated layout reference (marching-ant dashed lines) -->

      <svg viewBox="0 0 600 340" role="img" aria-hidden="true">
        <rect class="ants" x="70" y="28" width="460" height="120" rx="24" />
        <rect class="ants" x="220" y="200" width="310" height="120" rx="24" />
        <circle class="ants" cx="140" cy="178" r="54" />
        <text x="300" y="88" text-anchor="middle" dominant-baseline="middle">banner</text>
        <text x="140" y="178" text-anchor="middle" dominant-baseline="middle">avatar</text>
        <text x="375" y="260" text-anchor="middle" dominant-baseline="middle">other pictures</text>
      </svg>
    </section>

    <p class="designs-types">
      Channel &amp; profile design — YouTube banners, thumbnails &amp; avatars ·
      Twitch panels, overlays &amp; emotes · Twitter / X headers · Instagram &amp; TikTok ·
      Discord · Spotify &amp; SoundCloud cover art · posters · flyers · logos
    </p>

    <div data-render-into="designs"></div>
  </main>

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
